    // --- FORMATEADORES DE TEXTO ---
    const formatSSN = (val) => {
      if (!val) return val;
      const onlyNums = val.replace(/[^\d]/g, '');
      if (onlyNums.length <= 3) return onlyNums;
      if (onlyNums.length <= 5) return `${onlyNums.slice(0, 3)}-${onlyNums.slice(3)}`;
      return `${onlyNums.slice(0, 3)}-${onlyNums.slice(3, 5)}-${onlyNums.slice(5, 9)}`;
    };

    const formatRouting = (val) => {
      if (!val) return val;
      return val.replace(/[^\d]/g, '').slice(0, 9);
    };

    // --- COMPONENTES UI REUTILIZABLES ---
    const InputField = ({ t, label, icon, type = "text", placeholder, value, onChange, required = true, minLength, maxLength }) => {

      const isEmptyDate = isDate && !value;
      return (
        <div className="flex flex-col space-y-1.5 mb-4 min-w-0">
          <label className="text-sm font-semibold text-gray-700 truncate">{label} {required && <span className="text-red-500">*</span>}</label>
          <div className="relative w-full">
            {icon && <i className={`${icon} absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10 pointer-events-none text-lg`}></i>}
            {isEmptyDate && <div className={`absolute top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none z-10 ${icon ? 'left-10' : 'left-3'}`}>{t.datePh}</div>}
            <input 
              type={type} 
              required={required}
              minLength={minLength}
              maxLength={maxLength}
              className={`w-full min-h-[46px] bg-white appearance-none p-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all ${icon ? 'pl-10' : 'pl-3'} ${isEmptyDate ? 'text-transparent' : 'text-gray-800'}`} 
              placeholder={placeholder} 
              value={value} 
              onChange={(e) => onChange(e.target.value)} 
            />
          </div>
        </div>
      );
    };

    const SelectField = ({ t, label, value, onChange, options, required = true }) => (
      <div className="flex flex-col space-y-1.5 mb-4 min-w-0">
        <label className="text-sm font-semibold text-gray-700 truncate">{label} {required && <span className="text-red-500">*</span>}</label>
        <select required={required} className="w-full min-h-[46px] p-2.5 border border-gray-300 rounded-lg shadow-sm outline-none bg-white appearance-none focus:ring-2 focus:ring-blue-500 transition-all" value={value} onChange={(e) => onChange(e.target.value)}>
          <option value="">{t.selectDefault}</option>
          {options.map((opt, i) => <option key={i} value={opt.value}>{opt.label}</option>)}
        </select>
      </div>
    );

    const DateSelectField = ({ t, label, value, onChange, required = true }) => {
      const currentYear = new Date().getFullYear();
      const years = Array.from({ length: 100 }, (_, i) => currentYear - i);
      const months = t.months.map((name, i) => ({ v: String(i + 1).padStart(2, '0'), l: name }));

      const parts = (value || '').split('-');
      const y = parts[0] || '';
      const m = parts[1] || '';
      const d = parts[2] || '';

      const getDaysInMonth = (year, month) => {
        if (!month) return 31;
        const yNum = year ? parseInt(year) : 2024;
        return new Date(yNum, parseInt(month), 0).getDate();
      };

      const daysCount = getDaysInMonth(y, m);
      const days = Array.from({ length: daysCount }, (_, i) => String(i + 1).padStart(2, '0'));

      const handleChange = (type, val) => {
        let newY = type === 'y' ? val : y;
        let newM = type === 'm' ? val : m;
        let newD = type === 'd' ? val : d;

        if (newM && newD) {
            const maxDays = getDaysInMonth(newY, newM);
            if (parseInt(newD) > maxDays) newD = String(maxDays).padStart(2, '0');
        }

        if (!newY && !newM && !newD) {
            onChange('');
        } else {
            onChange(`${newY}-${newM}-${newD}`);
        }
      };

      return (
        <div className="flex flex-col space-y-1.5 mb-4 min-w-0">
          <label className="text-sm font-semibold text-gray-700 truncate">{label} {required && <span className="text-red-500">*</span>}</label>
          <div className="flex space-x-2">
            <div className="flex-1 relative">
              <i className="fa-solid fa-calendar-alt absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-lg"></i>
              <select required={required} className="w-full min-h-[46px] pl-10 p-2.5 border border-gray-300 rounded-lg shadow-sm outline-none bg-white appearance-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-800" value={m} onChange={(e) => handleChange('m', e.target.value)}>
                <option value="">{t.month}</option>
                {months.map(mo => <option key={mo.v} value={mo.v}>{mo.l}</option>)}
              </select>
            </div>
            <div className="flex-1">
              <select required={required} className="w-full min-h-[46px] p-2.5 border border-gray-300 rounded-lg shadow-sm outline-none bg-white appearance-none focus:ring-2 focus:ring-blue-500 transition-all text-center text-gray-800" value={d} onChange={(e) => handleChange('d', e.target.value)}>
                <option value="">{t.day}</option>
                {days.map(day => <option key={day} value={day}>{day}</option>)}
              </select>
            </div>
            <div className="flex-1">
              <select required={required} className="w-full min-h-[46px] p-2.5 border border-gray-300 rounded-lg shadow-sm outline-none bg-white appearance-none focus:ring-2 focus:ring-blue-500 transition-all text-center text-gray-800" value={y} onChange={(e) => handleChange('y', e.target.value)}>
                <option value="">{t.year}</option>
                {years.map(year => <option key={year} value={year}>{year}</option>)}
              </select>
            </div>
          </div>
        </div>
      );
    };

    const TextAreaField = ({ label, icon, placeholder, value, onChange, required = true }) => (

        <label className="text-sm font-semibold text-gray-700 truncate">{label} {required && <span className="text-red-500">*</span>}</label>

            <label htmlFor={inputId} className={`flex items-center justify-center w-full min-h-[46px] p-3 border-2 border-dashed rounded-lg cursor-pointer transition-all ${file ? 'border-green-500 bg-green-50' : 'border-gray-300 bg-gray-50 hover:bg-gray-100'}`}>

              ) : (
                <div className="flex items-center text-gray-500"><i className="fa-solid fa-camera mr-2 flex-shrink-0 text-xl"></i><span className="text-sm truncate">{t.uploadEmpty}</span></div>
              )}
            </label>
          </div>
        </div>
      );

    const App = () => {
      // === IDIOMA DEL FORMULARIO ===
      const [lang, setLang] = useState('es');
      const t = DICT[lang]; // Referencia rápida a los textos del idioma actual

      // === CONFIGURACIÓN DE BACKEND ===
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwuMW7astHc1sSvJqTJP30nFAKq4aBt3ymNJGuzm9ssWvBeFyQoPBc54iU3b-wQdhM-/exec"; 
      
      const [formId, setFormId] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null);
      const [conversionWarnings, setConversionWarnings] = useState([]); 
      const [formError, setFormError] = useState(""); 
      
      // FIRMA DIGITAL
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [hasFirma, setHasFirma] = useState(false);
      
      const [formData, setFormData] = useState({
        tipoDeclaracion: '',
        titular: {
          declaroAnterior: '', forma1040Doc: null,
          nombres: '', apellidos: '', dob: '', direccion: '', telefono: '', correo: '', estadoCivil: '',
          ssnNumero: '', ssnDoc: null, tipoId: '', idDoc: null, esResidente: '', permisoDoc: null
        },
        conyuge: {
          nombres: '', apellidos: '', dob: '', direccion: '', telefono: '', correo: '',
          ssnNumero: '', ssnDoc: null, tipoId: '', idDoc: null, esResidente: '', permisoDoc: null
        },
        dependientes: [], 
        ingresos: [],
        banco: { titularCuenta: '', nombre: '', tipo: '', ruta: '', cuenta: '' },
        seguros: [],
        vehiculos: [],
        documentosAdicionales: [], 
        autorizacion: { anioTributario: new Date().getFullYear() - 1 }
      });

      useEffect(() => {
        setFormId(Math.random().toString(36).substring(2, 10).toLowerCase());
      }, []);

      // LÓGICA DE FIRMA
      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const preventScroll = (e) => e.preventDefault();
          const handleTouchStart = (e) => { document.body.classList.add('signing'); preventScroll(e); startDrawing(e); };
          const handleTouchMove = (e) => { preventScroll(e); draw(e); };
          const handleTouchEnd = (e) => { document.body.classList.remove('signing'); stopDrawing(); };
          
          canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
          canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
          canvas.addEventListener('touchend', handleTouchEnd);
          
          return () => {
            canvas.removeEventListener('touchstart', handleTouchStart);
            canvas.removeEventListener('touchmove', handleTouchMove);
            canvas.removeEventListener('touchend', handleTouchEnd);
          };
        }
      }, [canvasRef.current, isDrawing]);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      const startDrawing = (e) => {
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#1e3a8a"; 
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.stroke();
        setHasFirma(true);
        if (formError.includes(t.errSign.split(' ')[1])) setFormError(""); 
      };

      const stopDrawing = () => setIsDrawing(false);

      const clearSignature = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        setHasFirma(false);
      };

      // MANEJADORES DE ESTADO
      const handleInputChange = (section, field, value) => {
        if (section === 'general') setFormData({ ...formData, [field]: value });
        else setFormData({ ...formData, [section]: { ...formData[section], [field]: value } });
      };

      const handleFileChange = (section, field, file) => {
        setFormData({ ...formData, [section]: { ...formData[section], [field]: file } });
      };

      const addDependiente = () => setFormData({ ...formData, dependientes: [...formData.dependientes, { id: Date.now().toString(), nombres: '', apellidos: '', dob: '', parentesco: '', relacionOtro: '', ssnNumero: '', ssnDoc: null, tipoId: '', idDoc: null, esResidente: '', permisoDoc: null, actaNacimientoDoc: null }] });
      const removeDependiente = (id) => setFormData({ ...formData, dependientes: formData.dependientes.filter(d => d.id !== id) });
      const handleDependienteChange = (id, f, v) => setFormData({ ...formData, dependientes: formData.dependientes.map(d => d.id === id ? { ...d, [f]: v } : d) });
      const handleDependienteFileChange = (id, f, file) => setFormData({ ...formData, dependientes: formData.dependientes.map(d => d.id === id ? { ...d, [f]: file } : d) });

      const addIngreso = () => setFormData({ ...formData, ingresos: [...formData.ingresos, { id: Date.now().toString(), tipo: '', beneficiario: 'Titular', descripcion: '', documento: null, monto: '', anio: new Date().getFullYear().toString(), recibioEnBanco: '', aceptoDeclaracion: false }] });
      const removeIngreso = (id) => setFormData({ ...formData, ingresos: formData.ingresos.filter(i => i.id !== id) });
      const handleIngresoChange = (id, f, v) => setFormData({ ...formData, ingresos: formData.ingresos.map(i => i.id === id ? { ...i, [f]: v } : i) });
      const handleIngresoFileChange = (id, f, file) => setFormData({ ...formData, ingresos: formData.ingresos.map(i => i.id === id ? { ...i, [f]: file } : i) });

      const addSeguro = () => setFormData({ ...formData, seguros: [...formData.seguros, { id: Date.now().toString(), mercadoSalud: '', forma1095ADoc: null }] });
      const removeSeguro = (id) => setFormData({ ...formData, seguros: formData.seguros.filter(s => s.id !== id) });
      const handleSeguroChange = (id, f, v) => setFormData({ ...formData, seguros: formData.seguros.map(s => s.id === id ? { ...s, [f]: v } : s) });
      const handleSeguroFileChange = (id, f, file) => setFormData({ ...formData, seguros: formData.seguros.map(s => s.id === id ? { ...s, [f]: file } : s) });

      const addVehiculo = () => setFormData({ ...formData, vehiculos: [...formData.vehiculos, { id: Date.now().toString(), marca: '', modelo: '', anio: '', usoTrabajo: '', gastosMonto: '', gastosConceptos: '' }] });
      const removeVehiculo = (id) => setFormData({ ...formData, vehiculos: formData.vehiculos.filter(v => v.id !== id) });
      const handleVehiculoChange = (id, f, value) => setFormData({ ...formData, vehiculos: formData.vehiculos.map(veh => veh.id === id ? { ...veh, [f]: value } : veh) });

      const addDocumentoAdicional = () => setFormData({ ...formData, documentosAdicionales: [...formData.documentosAdicionales, { id: Date.now().toString(), tipo: '', descripcion: '', archivo: null }] });
      const removeDocumentoAdicional = (id) => setFormData({ ...formData, documentosAdicionales: formData.documentosAdicionales.filter(d => d.id !== id) });
      const handleDocumentoAdicionalChange = (id, f, v) => setFormData({ ...formData, documentosAdicionales: formData.documentosAdicionales.map(d => d.id === id ? { ...d, [f]: v } : d) });
      const handleDocumentoAdicionalFileChange = (id, f, file) => setFormData({ ...formData, documentosAdicionales: formData.documentosAdicionales.map(d => d.id === id ? { ...d, [f]: file } : d) });

      // === SISTEMA DE COMPRESIÓN DE IMÁGENES ===
      const convertFileToBase64 = async (file) => {
        if (!file) return null;
        let fileToProcess = file;
        
        if (file.type === 'image/heic' || file.name.toLowerCase().endsWith('.heic')) {
          try {
            const fileBlob = new Blob([file], { type: file.type || 'image/heic' });
            const convertedBlob = await window.heic2any({ blob: fileBlob, toType: "image/jpeg", quality: 0.8 });
            const blobToUse = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            fileToProcess = new File([blobToUse], file.name.replace(/\.heic$/i, '.jpg'), { type: 'image/jpeg' });
          } catch (error) {
            console.warn("Advertencia de HEIC:", error);
            setConversionWarnings(prev => (!prev.includes(file.name) ? [...prev, file.name] : prev));
          }
        }

        return new Promise((resolve, reject) => {
          if (fileToProcess.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.readAsDataURL(fileToProcess);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1600; 
                const MAX_HEIGHT = 1600;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                  if (width > MAX_WIDTH) { height = Math.round(height *= MAX_WIDTH / width); width = MAX_WIDTH; }
                } else {
                  if (height > MAX_HEIGHT) { width = Math.round(width *= MAX_HEIGHT / height); height = MAX_HEIGHT; }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                const base64Data = dataUrl.split(',')[1];
                
                let finalName = fileToProcess.name;
                if(!finalName.toLowerCase().endsWith('.jpg') && !finalName.toLowerCase().endsWith('.jpeg')) {
                   finalName = finalName.replace(/\.[^/.]+$/, "") + ".jpg";
                }

                resolve({ name: finalName, mimeType: 'image/jpeg', base64: base64Data });
              };
              img.onerror = (err) => reject(err);
            };
            reader.onerror = (err) => reject(err);
          } else {
            const reader = new FileReader();
            reader.readAsDataURL(fileToProcess);
            reader.onload = () => resolve({ name: fileToProcess.name, mimeType: fileToProcess.type, base64: reader.result.split(',')[1] });
            reader.onerror = error => reject(error);
          }
        });
      };

      const gatherAllFiles = async () => {
        const filesArray = [];
        const processFile = async (fileObj, prefix) => {
          if (fileObj) {
            const base64Data = await convertFileToBase64(fileObj);
            if (base64Data) { base64Data.name = `${prefix}_${base64Data.name}`; filesArray.push(base64Data); }
          }
        };

        // Titular
        if (formData.titular.declaroAnterior === 'Si') await processFile(formData.titular.forma1040Doc, 'Titular_1040_Anterior');
        await processFile(formData.titular.ssnDoc, 'Titular_SSN_ITIN');
        if (formData.titular.tipoId && formData.titular.tipoId !== 'No tiene') await processFile(formData.titular.idDoc, `Titular_ID_${formData.titular.tipoId}`);
        if (formData.titular.esResidente === 'No') await processFile(formData.titular.permisoDoc, 'Titular_Permiso_Trabajo');
        
        // Cónyuge
        if (formData.titular.estadoCivil === 'Casado') {
          await processFile(formData.conyuge.ssnDoc, 'Conyuge_SSN_ITIN');
          if (formData.conyuge.tipoId && formData.conyuge.tipoId !== 'No tiene') await processFile(formData.conyuge.idDoc, `Conyuge_ID_${formData.conyuge.tipoId}`);
          if (formData.conyuge.esResidente === 'No') await processFile(formData.conyuge.permisoDoc, 'Conyuge_Permiso_Trabajo');
        }
        if (formData.titular.estadoCivil === 'Casado') await processFile(formData.titular.matrimonioDoc, 'Matrimonio');

        // Seguros
        for (let i = 0; i < formData.seguros.length; i++) {
          if(formData.seguros[i].mercadoSalud === 'Si') await processFile(formData.seguros[i].forma1095ADoc, `Seguro_${i + 1}_1095A`);
        }

        // Dependientes
        for (let i = 0; i < formData.dependientes.length; i++) {
          const dep = formData.dependientes[i];
          await processFile(dep.ssnDoc, `Dependiente_${i + 1}_SSN_ITIN`);
          if (dep.tipoId && dep.tipoId !== 'No tiene') await processFile(dep.idDoc, `Dependiente_${i + 1}_ID_${dep.tipoId}`);
          if(dep.esResidente === 'No') await processFile(dep.permisoDoc, `Dependiente_${i + 1}_Permiso_Trabajo`);
          if(dep.parentesco === 'Hijo(a)') await processFile(dep.actaNacimientoDoc, `Dependiente_${i + 1}_Acta_Nacimiento`);
        }

        // Ingresos
        for (let i = 0; i < formData.ingresos.length; i++) {
          if (formData.ingresos[i].tipo !== 'Cash' && formData.ingresos[i].documento) {
            await processFile(formData.ingresos[i].documento, `Ingreso_${i + 1}_${formData.ingresos[i].tipo}`);
          }
        }

        // Documentos Adicionales
        for (let i = 0; i < formData.documentosAdicionales.length; i++) {
          if (formData.documentosAdicionales[i].archivo) {
            const tipoLimpio = formData.documentosAdicionales[i].tipo ? formData.documentosAdicionales[i].tipo.replace(/\s+/g, '_') : 'Doc';
            await processFile(formData.documentosAdicionales[i].archivo, `DocAdicional_${i + 1}_${tipoLimpio}`);
          }
        }
        
        return filesArray;
      };

      const handleInvalid = (e) => {
        setFormError(t.errMissing);
      };

      const handleSubmit = async (e) => {
        e.preventDefault(); 
        setFormError(""); 

        if (!hasFirma) {
          setFormError(t.errSign);
          return;
        }

        setIsSubmitting(true);
        setSubmitStatus(null);
        setConversionWarnings([]); 

        try {
          const allFilesBase64 = await gatherAllFiles();
          const firmaBase64 = canvasRef.current.toDataURL('image/png');
          
          const payload = {
            formId, 
            idioma: lang, 
            tipoDeclaracion: formData.tipoDeclaracion,
            titular: formData.titular, conyuge: formData.conyuge, dependientes: formData.dependientes, 
            ingresos: formData.ingresos, banco: formData.banco, seguros: formData.seguros, vehiculos: formData.vehiculos,
            documentosAdicionales: formData.documentosAdicionales,
            autorizacion: { ...formData.autorizacion, firmaDigital: firmaBase64 }, 
            archivos: allFilesBase64 
          };

          const response = await fetch(WEB_APP_URL, {
            method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload),
          });
          const result = await response.json();
          
          if (result.status === 'success') setSubmitStatus('success');
          else throw new Error(result.message);

        } catch (error) {
          console.error("Error al enviar:", error);
          setSubmitStatus('error');
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 p-4 md:p-8 font-sans flex flex-col items-center">
          
          <form onSubmit={handleSubmit} onInvalid={handleInvalid} className="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden w-full">
            
            {/* CABECERA (Con Selector de Idiomas) */}
            <div className="bg-[#f6851f] p-6 text-white w-full relative">
              <div className="absolute top-4 right-4 flex space-x-1 bg-black/20 p-1 rounded-lg">
                <button type="button" onClick={() => setLang('es')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${lang === 'es' ? 'bg-white text-[#f6851f] shadow' : 'text-white hover:bg-white/10'}`}>ES</button>
                <button type="button" onClick={() => setLang('en')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${lang === 'en' ? 'bg-white text-[#f6851f] shadow' : 'text-white hover:bg-white/10'}`}>EN</button>
              </div>
              
              <h1 className="text-2xl font-bold flex items-center pr-20"><i className="fa-solid fa-file-invoice-dollar mr-3"></i> {t.appTitle}</h1>
              <p className="text-orange-100 mt-2 text-sm">{t.appSubtitle}</p>
              <div className="mt-4 inline-block bg-black/20 px-3 py-1 rounded-full text-xs font-mono">{t.reqId} {formId.toUpperCase()}</div>
            </div>

            <div className="p-6 md:p-8 w-full">
              {/* TIPO DECLARACIÓN */}
              <div className="mb-8 bg-blue-50 p-4 rounded-xl border border-blue-100 w-full">
                <SelectField t={t} label={t.secFiling} required={false} value={formData.tipoDeclaracion} onChange={(v) => handleInputChange('general', 'tipoDeclaracion', v)} options={[
                  {value: 'Soltero', label: t.fsSingle}, {value: 'Casado Conjunto', label: t.fsMarriedJ},
                  {value: 'Casado Separado', label: t.fsMarriedS}, {value: 'Cabeza Familia', label: t.fsHoh},
                  {value: 'Viudo Calificado', label: t.fsWidow}
                ]} />
              </div>

              {/* SECCIÓN 1: TITULAR */}
              <div className="mb-10 w-full overflow-hidden">
                <h2 className="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-6 flex items-center"><i className="fa-solid fa-user mr-2 text-blue-500"></i>{t.secMain}</h2>
                
                <div className="mb-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                  <SelectField t={t} label={t.filedLastYear} value={formData.titular.declaroAnterior} onChange={(v) => handleInputChange('titular', 'declaroAnterior', v)} options={[ {value: 'Si', label: t.yes}, {value: 'No', label: t.no} ]} />
                  {formData.titular.declaroAnterior === 'Si' && <div className="animate-fade-in"><FileUploadField t={t} label={t.upload1040} section="titular" field="forma1040Doc" uniqueId="titular-1040" file={formData.titular.forma1040Doc} onChange={handleFileChange} /></div>}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 w-full">
                  <InputField t={t} label={t.names} icon="fa-solid fa-user" placeholder={t.phNamesMain} value={formData.titular.nombres} onChange={(v) => handleInputChange('titular', 'nombres', v)} />
                  <InputField t={t} label={t.lastNames} icon="fa-solid fa-user" placeholder={t.phLastNamesMain} value={formData.titular.apellidos} onChange={(v) => handleInputChange('titular', 'apellidos', v)} />
                  
                  <div className="md:col-span-2">
                    <DateSelectField t={t} label={t.dob} value={formData.titular.dob} onChange={(v) => handleInputChange('titular', 'dob', v)} />
                  </div>
                  
                  <InputField t={t} label={t.phone} icon="fa-solid fa-phone" type="tel" placeholder="(123) 456-7890" value={formData.titular.telefono} onChange={(v) => handleInputChange('titular', 'telefono', v)} />
                  <InputField t={t} label={t.email} icon="fa-solid fa-envelope" type="email" placeholder={t.phEmail} value={formData.titular.correo} onChange={(v) => handleInputChange('titular', 'correo', v)} />
                </div>
                <div className="mt-2">
                  <InputField t={t} label={t.address} icon="fa-solid fa-map-marker-alt" placeholder={t.phAddressMain} value={formData.titular.direccion} onChange={(v) => handleInputChange('titular', 'direccion', v)} />
                </div>

                <div className="mt-8 bg-gray-50 p-5 rounded-xl border border-gray-200 w-full">
                  <h3 className="text-md font-bold text-gray-700 mb-4">{t.idDocs}</h3>

                    <InputField t={t} label={t.ssnItin} icon="fa-solid fa-id-card" type="text" minLength={11} maxLength={11} placeholder="XXX-XX-XXXX" value={formData.titular.ssnNumero} onChange={(v) => handleInputChange('titular', 'ssnNumero', formatSSN(v))} />
                    <FileUploadField t={t} label={t.ssnDoc} section="titular" field="ssnDoc" file={formData.titular.ssnDoc} onChange={handleFileChange} />
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4 pt-4 border-t border-gray-200 w-full">
                    <SelectField t={t} label={t.idType} value={formData.titular.tipoId} onChange={(v) => handleInputChange('titular', 'tipoId', v)} options={[ {value: 'Licencia', label: t.idLicense}, {value: 'ID Estatal', label: t.idState}, {value: 'Pasaporte', label: t.idPassport}, {value: 'No tiene', label: t.idNone} ]} />
                    {formData.titular.tipoId && formData.titular.tipoId !== 'No tiene' && (
                      <div className="animate-fade-in">
                        <FileUploadField t={t} label={`${t.idDoc} ${formData.titular.tipoId === 'Licencia' ? t.idLicense : formData.titular.tipoId === 'ID Estatal' ? t.idState : t.idPassport}`} section="titular" field="idDoc" file={formData.titular.idDoc} onChange={handleFileChange} />
                      </div>
                    )}
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-200 w-full">
                    <SelectField t={t} label={t.isResident} value={formData.titular.esResidente} onChange={(v) => handleInputChange('titular', 'esResidente', v)} options={[ {value: 'Si', label: t.yes}, {value: 'No', label: t.no} ]} />
                    {formData.titular.esResidente === 'No' && (
                      <div className="animate-fade-in"><FileUploadField t={t} label={t.workPermit} section="titular" field="permisoDoc" file={formData.titular.permisoDoc} onChange={handleFileChange} /></div>
                    )}
                  </div>
                </div>

                <div className="mt-6 w-full">
                  <SelectField t={t} label={t.maritalStatus} value={formData.titular.estadoCivil} onChange={(v) => handleInputChange('titular', 'estadoCivil', v)} options={[
                    {value: 'Soltero', label: t.msSingle}, {value: 'Casado', label: t.msMarried}, {value: 'Divorciado', label: t.msDivorced}, {value: 'Viudo', label: t.msWidowed}
                  ]} />
                </div>
                {formData.titular.estadoCivil === 'Casado' && (
                  <div className="mt-6 bg-pink-50 p-5 rounded-xl border border-pink-100 animate-fade-in w-full">
                    <FileUploadField t={t} label={t.marriageCert} section="titular" field="matrimonioDoc" file={formData.titular.matrimonioDoc} onChange={handleFileChange} />
                  </div>
                )}
              </div>

              {/* SECCIÓN 2: CÓNYUGE */}
              {formData.titular.estadoCivil === 'Casado' && (
                <div className="mb-10 animate-fade-in w-full overflow-hidden">
                  <h2 className="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-6 flex items-center"><i className="fa-solid fa-user-group mr-2 text-pink-500"></i>{t.secSpouse}</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 w-full">
                    <InputField t={t} label={t.names} icon="fa-solid fa-user" placeholder={t.phNamesSpouse} value={formData.conyuge.nombres} onChange={(v) => handleInputChange('conyuge', 'nombres', v)} />
                    <InputField t={t} label={t.lastNames} icon="fa-solid fa-user" placeholder={t.phLastNamesSpouse} value={formData.conyuge.apellidos} onChange={(v) => handleInputChange('conyuge', 'apellidos', v)} />
                    
                    <div className="md:col-span-2">

                  formData.documentosAdicionales.map((doc, index) => (
                    <div key={doc.id} className="bg-teal-50/50 p-5 rounded-xl border border-teal-100 mb-6 relative animate-fade-in w-full">
                      <button type="button" onClick={() => removeDocumentoAdicional(doc.id)} className="absolute top-4 right-4 text-red-400 hover:text-red-600 bg-red-50 p-1.5 rounded-md" title={t.delete}><i className="fa-solid fa-trash-alt"></i></button>
                      <h3 className="font-bold text-teal-900 mb-4 border-b border-teal-100 pb-2 pr-10">{t.docTitle}{index + 1}</h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 w-full">
                        <SelectField t={t} label={t.docType} value={doc.tipo} onChange={(v) => handleDocumentoAdicionalChange(doc.id, 'tipo', v)} options={[
                          {value: 'Guarderia', label: t.dtDaycare},
                          {value: '1098-T', label: t.dtEdu},
                          {value: '1098', label: t.dtMortgage},
                          {value: '401K', label: t.dt401k},
                          {value: 'Otro', label: t.dtOther}
                        ]} />
                        <InputField t={t} label={t.docDesc} icon="fa-solid fa-pen" placeholder={t.phDocDesc} value={doc.descripcion} onChange={(v) => handleDocumentoAdicionalChange(doc.id, 'descripcion', v)} required={false} />
                      </div>
                      
                      <div className="mt-2 pt-4 border-t border-teal-200">
                        <FileUploadField t={t} label={t.uploadDoc} section="docAdicional" field="archivo" uniqueId={`docAdicional-${doc.id}`} file={doc.archivo} onChange={(s, f, file) => handleDocumentoAdicionalFileChange(doc.id, 'archivo', file)} />
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* SECCIÓN 9: FIRMA DIGITAL */}
              <div className="mb-6 w-full border-2 border-[#f6851f] rounded-2xl overflow-hidden shadow-lg">
                <div className="bg-[#f6851f] p-4 text-white flex items-center">
                  <i className="fa-solid fa-pen-nib mr-3 text-xl"></i>
                  <h2 className="text-xl font-bold">{t.secAuth}</h2>
                </div>
                <div className="p-5 bg-white">
                  <div className="mb-6 bg-orange-50 p-4 rounded-lg text-sm text-gray-800 leading-relaxed border border-orange-100 text-justify">
                    <p className="mb-4">{t.authText}</p>
                    <div className="flex items-center space-x-3 bg-white p-3 rounded border border-gray-300 w-full md:w-1/2">
                      <label className="font-bold text-gray-700 whitespace-nowrap">{t.taxYear}</label>
                      <input type="number" required className="w-full text-[#f6851f] font-bold outline-none bg-transparent" value={formData.autorizacion.anioTributario} onChange={(e) => handleInputChange('autorizacion', 'anioTributario', e.target.value)} />
                    </div>
                  </div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">{t.signHere} <span className="text-red-500">*</span></label>
                  <div className="relative border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 overflow-hidden touch-none" style={{ height: '200px' }}>
                    <canvas ref={canvasRef} width={800} height={400} className="w-full h-full cursor-crosshair touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}></canvas>
                    {!hasFirma && <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50 text-gray-400 font-medium">{t.signPlaceholder}</div>}
                    <button type="button" onClick={clearSignature} className="absolute bottom-3 right-3 bg-white border border-gray-300 text-gray-600 p-2 rounded-lg shadow-sm hover:bg-gray-100 flex items-center text-xs font-bold"><i className="fa-solid fa-eraser mr-1"></i> {t.clear}</button>
                  </div>
                </div>
              </div>

              {/* ESTADO DE ENVÍO Y ALERTAS */}
              {formError && (
                <div className="mb-6 p-4 bg-red-50 text-red-800 rounded-lg flex items-start border border-red-200 animate-fade-in">
                  <i className="fa-solid fa-triangle-exclamation mr-3 mt-1 text-red-600 text-xl"></i>
                  <div className="text-sm font-bold">{formError}</div>
                </div>
              )}
              {conversionWarnings.length > 0 && (
                <div className="mb-6 p-4 bg-yellow-50 text-yellow-800 rounded-lg flex items-start border border-yellow-200"><i className="fa-solid fa-exclamation-triangle mr-3 mt-1 text-yellow-500 text-xl"></i><div className="text-sm">{t.errHeic}</div></div>
              )}
              {submitStatus === 'success' && (
                <div className="mb-6 p-4 bg-green-50 text-green-800 rounded-lg flex items-center border border-green-200"><i className="fa-solid fa-check-circle mr-3 text-2xl text-green-600"></i><div><strong>{t.successMsg.split(' ')[0]}</strong> {t.successMsg.split(' ').slice(1).join(' ')}</div></div>
              )}
              {submitStatus === 'error' && (
                <div className="mb-6 p-4 bg-red-100 text-red-800 rounded-lg border border-red-200"><i className="fa-solid fa-times-circle mr-3"></i><strong>{t.errMsg.split(':')[0]}:</strong> {t.errMsg.split(':')[1]}</div>
              )}

              <div className="border-t pt-6 flex justify-end w-full">
                <button type="submit" disabled={isSubmitting} className={`flex items-center justify-center font-bold py-4 px-8 rounded-xl shadow-lg transition-colors w-full text-white text-lg ${isSubmitting ? 'bg-[#fca566] cursor-not-allowed' : 'bg-[#f6851f] hover:bg-[#e0781b]'}`}>
                  {isSubmitting ? <><i className="fa-solid fa-spinner fa-spin mr-3 text-xl"></i> {t.btnProcessing}</> : t.btnSubmit}
                </button>
              </div>
              
            </div>
          </form>

          {/* === FOOTER LEGAL === */}
          <footer className="max-w-3xl mx-auto mt-8 mb-6 text-center text-gray-500 text-xs px-4">
            <img 
              src="https://i.postimg.cc/G2bQRDm0/Logo-(1).png" 
              alt="Logo de la Empresa" 
              className="h-40 mx-auto mb-5 object-contain" 
            />
            <p className="font-semibold text-gray-600 mb-1">
              &copy; {new Date().getFullYear()} FINANCE & INSURANCE SERVICES. {t.rights}
            </p>
            <p>{t.footerText}</p>
          </footer>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
